# ═══════════════════════════════════════════════════════════════════════
# Persona profiles — model/thinking policy only
# ═══════════════════════════════════════════════════════════════════════
# /profile selects the account/model profile for this session.
# /persona selects the prompt/tools persona and uses the active profile.
# Use /persona <name>:<profile> for a one-off profile override.
# Use `pi --profile <name>` to select the profile at startup.
#
# Auth expectation:
#   work:    FIREWORKS_API_KEY env var or /login fireworks (oracle/planner still use openai-codex-work)
#   personal: /login openai-codex-personal
#
# Keep model/thinking here. Keep prompts, tools, skills, and descriptions in
# markdown: agents/<name>.md or personas/orchestrator/<family>.md.
#
# Model format: provider/model
# Thinking: off | minimal | low | medium | high | xhigh
# Subagents receive provider/model:thinking when they did not set model.
# ═══════════════════════════════════════════════════════════════════════

active_profile: personal
default_persona: orchestrator

profiles:
  work:
    description: Work Codex account
    personas:
      orchestrator:
        model: fireworks/accounts/fireworks/models/glm-5p2
        thinking: high
      oracle:
        model: openai-codex-work/gpt-5.5
        thinking: xhigh
      planner:
        model: openai-codex-work/gpt-5.5
        thinking: high
      reviewer:
        model: fireworks/accounts/fireworks/models/kimi-k2p7-code
        thinking: high
      scout:
        model: fireworks/accounts/fireworks/models/minimax-m3
        thinking: off
      worker:
        model: fireworks/accounts/fireworks/models/kimi-k2p7-code
        thinking: medium
      librarian:
        model: fireworks/accounts/fireworks/models/deepseek-v4-flash
        thinking: off

  personal:
    description: Personal Codex account
    default: true
    personas:
      orchestrator:
        model: opencode-go/kimi-k2.7-code
        thinking: high
      oracle:
        model: openai-codex-personal/gpt-5.5
        thinking: high
      planner:
        model: openai-codex-personal/gpt-5.5
        thinking: high
      reviewer:
        model: opencode-go/kimi-k2.7-code
        thinking: high
      scout:
        model: opencode-go/deepseek-v4-flash
        thinking: off
      worker:
        model: opencode-go/kimi-k2.7-code
        thinking: high
      librarian:
        model: opencode-go/deepseek-v4-flash
        thinking: off
