# App workspace assignments
windowrule = workspace 10 silent, match:class ^(Spotify|spotify)$
windowrule = workspace 5 silent, match:class ^(Slack|slack)$
windowrule = workspace 1 silent, match:class ^(zen-alpha|zen|Zen Browser)$

# CopyQ floating
windowrule = float, match:class ^com.github.hluk.copyq$
windowrule = size 800 600, match:class ^com.github.hluk.copyq$
windowrule = center, match:class ^com.github.hluk.copyq$

# Zoom color fix
windowrule = forcergbx, match:class ^(zoom)$

# Master layout
general {
    layout = master
}

master {
    new_status = slave
    allow_small_split = true
    smart_resizing = true
}
