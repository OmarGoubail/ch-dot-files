# Application bindings
$terminal = uwsm app -- ghostty
$browser = omarchy-launch-browser

# Your preferred app bindings
bindd = SUPER, return, Terminal, exec, $terminal start --always-new-process
bindd = SUPER, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER, M, Music, exec, hyprctl dispatch focuswindow "class:chrome-music.youtube.com__-Default" || omarchy-launch-webapp "https://music.youtube.com/"
bindd = SUPER, N, Neovim, exec, $terminal -e nvim
bindd = SUPER, G, Signal, exec, uwsm app -- signal-desktop
bindd = SUPER, S, Slack, exec, uwsm app -- slack
bindd = SUPER, O, Obsidian, exec, uwsm app -- obsidian -disable-gpu
bindd = SUPER, C, Claude, exec, omarchy-launch-webapp "https://claude.ai"
bindd = SUPER, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER, P, Superproductivity, exec, env -i HOME="$HOME" PATH="$PATH" DISPLAY="$DISPLAY" USER="$USER" XDG_RUNTIME_DIR="$XDG_RUNTIME_DIR" uwsm app -- superproductivity
bindd = SUPER, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"
bindd = SUPER, D, Speak, exec, $terminal -e flatpak run net.mkiol.SpeechNote --action start-listening-active-window

# Window navigation with vim keys
unbind = SUPER, K
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Clipboard
bindd = SUPER SHIFT, C, CLIPBOARD, exec, copyq toggle

# Master layout controls
bind = SUPER SHIFT, M, layoutmsg, swapwithmaster
bind = SUPER, \, layoutmsg, focusmaster

# Toggle layout
unbind = SUPER, W
bindd = SUPER, W, Toggle layout, exec, case "$(hyprctl -j getoption general:layout | jq -r .str)" in dwindle) hyprctl keyword general:layout master ;; master) hyprctl keyword general:layout dwindle ;; esac

# Close window
bindd = SUPER, Q, Close window, killactive,

# Tabbed groups
unbind = SUPER, TAB
bind = SUPER, T, togglegroup
bind = SUPER, TAB, changegroupactive
bind = SUPER CTRL, H, moveintogroup, l
bind = SUPER CTRL, L, moveintogroup, r
bind = SUPER CTRL, J, moveintogroup, d
bind = SUPER CTRL, K, moveintogroup, u
bind = SUPER SHIFT, T, moveoutofgroup

# Move windows
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Omarchy bindings that don't conflict
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# Omarchy webapp bindings
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
# Note: SUPER SHIFT C is your clipboard toggle, so Calendar is moved to SUPER SHIFT ALT C
bindd = SUPER SHIFT ALT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X (Omarchy), exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post (Omarchy), exec, omarchy-launch-webapp "https://x.com/compose/post"
