# ==============================================
# TOKYO NIGHT STORM THEME - MINIMAL
# ==============================================
# Simple, clean status bar with Tokyo Night Storm colors
# No fancy separators, just clean squares and minimal styling
# ==============================================

# --- Color Definitions ---
set -g @tokyo-night-bg           '#1f2335'
set -g @tokyo-night-fg           '#a9b1d6'
set -g @tokyo-night-black        '#414868'
set -g @tokyo-night-blue         '#7aa2f7'
set -g @tokyo-night-purple       '#bb9af7'
set -g @tokyo-night-dim          '#565f89'
set -g @tokyo-night-highlight    '#3b4261'

# ==============================================
# STATUS BAR - MINIMAL & CLEAN
# ==============================================

set -g status-position top
set -g status-interval 5
set -g status-justify left

# Status bar background matching terminal background
set -g status-style "fg=#{@tokyo-night-fg},bg=#{@tokyo-night-bg}"

# Status bar length
set -g status-left-length 100
set -g status-right-length 100

# --- Left side: WINDOWS ONLY ---
# Simple window list on the left, no session name, no decorations
set -g status-left ""

# --- Right side: DIRECTORY ONLY ---
# Just show current directory basename
set -g status-right " #[fg=#{@tokyo-night-dim},bg=#{@tokyo-night-bg}]#{b:pane_current_path} "

# --- Window styling - simple squares ---
# Inactive windows - dim text
set -g window-status-style "fg=#{@tokyo-night-dim},bg=#{@tokyo-night-bg}"
set -g window-status-format " #W "

# Active window - bright blue, no background highlight
set -g window-status-current-style "fg=#{@tokyo-night-blue},bg=#{@tokyo-night-bg},bold"
set -g window-status-current-format " #W#{?window_zoomed_flag,+,} "

# Window separator (between windows)
set -g window-status-separator ""

# ==============================================
# SPACING - Gap between status bar and content
# ==============================================

# Add a 1-line gap between status bar and terminal content
set -g status-format[0] "#[align=left]#{W:#{E:window-status-format} ,#{E:window-status-current-format} }#[align=right]#{=20:pane_current_path}"
set -g status-format[1] ""
set -g status 2

# ==============================================
# UI COLORS - TOKYO NIGHT STORM
# ==============================================

# Message/command prompt
set -g message-style "fg=#{@tokyo-night-blue},bg=#{@tokyo-night-highlight},bold"
set -g message-command-style "fg=#{@tokyo-night-blue},bg=#{@tokyo-night-highlight},bold"

# Pane borders - purple active
set -g pane-border-style "fg=#{@tokyo-night-black},bg=default"
set -g pane-active-border-style "fg=#{@tokyo-night-purple},bg=default"

# Copy mode styling
setw -g mode-style "fg=#{@tokyo-night-blue},bg=#{@tokyo-night-highlight}"

# Clock mode
setw -g clock-mode-colour "#{@tokyo-night-blue}"
