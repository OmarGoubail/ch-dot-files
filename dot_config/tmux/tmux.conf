# ==============================================
# TMUX CONFIGURATION
# ==============================================

# ==============================================
# BASIC SETTINGS
# ==============================================

# Terminal colors
set-option -g default-terminal 'tmux-256color'
set-option -ga terminal-overrides ',xterm-256color:RGB,*:XT'
set-window-option -g xterm-keys on

# Session and window management
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
setw -g mode-keys vi
setw -g pane-base-index 1

# Extended key support - try both formats for compatibility
set -g extended-keys on
set -s extended-keys always
set -s allow-passthrough on
set -g allow-passthrough on

# Explicitly pass through Shift+Enter for modern terminals
bind-key -n S-Enter send-keys Escape "[13;2u"

# Mouse support
set -g mouse on

# ==============================================
# KEY BINDINGS - PREFIX
# ==============================================

# Change prefix from C-b to C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# ==============================================
# PANE MANAGEMENT
# ==============================================

# Split panes with | and -
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize/minimize pane
bind -r m resize-pane -Z

# ==============================================
# COPY MODE SETUP
# ==============================================

# Use vi keys in copy mode
setw -g mode-keys vi

# Enter copy mode
bind-key [ copy-mode

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Mouse support for copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Paste
bind-key ] paste-buffer

# ==============================================
# SESH SESSION MANAGER
# ==============================================

# Launch sesh session picker with prefix + T
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# ==============================================
# PLUGINS
# ==============================================
# tpm          - Tmux Plugin Manager (required)
# sensible     - Sensible defaults for tmux (better key bindings, scroll, etc.)
# yank         - Copy to system clipboard in copy-mode-vi
# smart-splits - Seamless navigation between tmux panes and vim splits
# tokyo-night  - Tokyo Night theme for tmux

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# --- smart-splits configuration ---
set -g @smart-splits_no_wrap ''  # disable wrapping (any value disables it)
set -g @smart-splits_move_left_key  'C-h'
set -g @smart-splits_move_down_key  'C-j'
set -g @smart-splits_move_up_key    'C-k'
set -g @smart-splits_move_right_key 'C-l'
set -g @smart-splits_resize_left_key  'M-h'
set -g @smart-splits_resize_down_key  'M-j'
set -g @smart-splits_resize_up_key    'M-k'
set -g @smart-splits_resize_right_key 'M-l'
set -g @smart-splits_resize_step_size '3'

# --- Tokyo Night theme ---
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_transparent 1

# Initialize plugin manager (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
