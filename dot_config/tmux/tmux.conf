# ==============================================
# TMUX CONFIGURATION
# Optimized for Ghostty + Tokyo Night Storm theme
# ==============================================

# Source theme (separate file for maintainability)
source-file ~/.config/tmux/themes/tokyo-night-storm.conf

# ==============================================
# BASIC SETTINGS
# ==============================================

# Terminal colors
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# Session and window management
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g default-terminal "${TERM}"

setw -g mode-keys vi
setw -g pane-base-index 1

# Extended key support
set -g extended-keys always

# Mouse support
set -g mouse on

# ==============================================
# KEY BINDINGS - PREFIX
# ==============================================

# Change prefix from C-b to C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# ==============================================
# PANE MANAGEMENT
# ==============================================

# Split panes with | and -
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize/minimize pane
bind -r m resize-pane -Z

# ==============================================
# COPY MODE SETUP
# ==============================================

# Use vi keys in copy mode
setw -g mode-keys vi

# Enter copy mode
bind-key [ copy-mode

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Mouse support for copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Paste
bind-key ] paste-buffer

# ==============================================
# PLUGINS
# ==============================================
# tpm          - Tmux Plugin Manager (required)
# sensible     - Sensible defaults for tmux (better key bindings, scroll, etc.)
# yank         - Copy to system clipboard in copy-mode-vi
# smart-splits - Seamless navigation between tmux panes and vim splits

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# --- smart-splits configuration ---
# Performance note: smart-splits uses neovim's RPC API for communication,
# which is generally faster than vim-tmux-navigator's shell commands.
# vim-tmux-navigator spawns a shell process on every navigation,
# while smart-splits talks directly to neovim via socket.
set -g @smart-splits_no_wrap ''  # disable wrapping (any value disables it)

# Navigation keys (same as vim)
set -g @smart-splits_move_left_key  'C-h'
set -g @smart-splits_move_down_key  'C-j'
set -g @smart-splits_move_up_key    'C-k'
set -g @smart-splits_move_right_key 'C-l'

# Resize keys (Alt+arrow keys)
set -g @smart-splits_resize_left_key  'M-h'
set -g @smart-splits_resize_down_key  'M-j'
set -g @smart-splits_resize_up_key    'M-k'
set -g @smart-splits_resize_right_key 'M-l'
set -g @smart-splits_resize_step_size '3'

# Theme - DISABLED (using custom Tokyo Night Storm theme file)
# set -g @plugin "janoamaral/tokyo-night-tmux"
# set -g @tokyo-night-tmux_theme storm

# Initialize plugin manager (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
